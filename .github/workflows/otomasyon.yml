name: Shitpost Avcisi

on:
  schedule:
    - cron: '0 5,17 * * *' # Günde iki kez (Sabah ve Akşam) otomatik çalışır
  workflow_dispatch: # İstediğinde manuel çalıştırman için bir buton ekler

jobs:
  verileri_guncelle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Depoyu Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        # Artık Reddit'in kendi kütüphanesine (praw) ihtiyacımız yok, sadece requests yeterli
        run: pip install requests

      - name: Avcıyı Çalıştır
        # GitHub kasasına koyduğumuz şifreyi burada koda veriyoruz
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python scraper.py

      - name: Yeni Verileri Kaydet (Commit)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data.json
          git commit -m "Yeni videolar eklendi" || exit 0
          git push
